<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tambah Hajatan - Manajemen Keluarga</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body>
  <!-- Sidebar Overlay (Mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/dashboard.html" class="sidebar-brand">
        <div class="sidebar-brand-icon">
          <i class="bi bi-house-heart"></i>
        </div>
        <div class="sidebar-brand-text">
          Keluarga
          <small>Manajemen Data</small>
        </div>
      </a>
    </div>

    <nav class="sidebar-nav">
      <p class="nav-section-title">Menu Utama</p>
      <a href="/dashboard.html" class="sidebar-link">
        <i class="bi bi-grid-1x2"></i>
        <span>Dashboard</span>
      </a>
      <a href="/sumbangan/daftar-sumbangan.html" class="sidebar-link">
        <i class="bi bi-cash-stack"></i>
        <span>Data Sumbangan</span>
      </a>
      <a href="/hajatan/daftar-hajatan.html" class="sidebar-link active">
        <i class="bi bi-calendar-event"></i>
        <span>Data Hajatan</span>
      </a>
      <a href="/gorden/pelanggan.html" class="sidebar-link">
        <i class="bi bi-window-split"></i>
        <span>Data Gorden</span>
      </a>
      <a href="/gorden/kalkulator-rab.html" class="sidebar-link">
        <i class="bi bi-calculator"></i>
        <span>Kalkulator RAB</span>
      </a>
      <a href="/gorden/katalog.html" class="sidebar-link">
        <i class="bi bi-journal-richtext"></i>
        <span>Katalog Produk</span>
      </a>

      <p class="nav-section-title mt-4">Lainnya</p>
      <a href="/laporan.html" class="sidebar-link">
        <i class="bi bi-file-earmark-bar-graph"></i>
        <span>Laporan</span>
      </a>
      <a href="/gorden/kelola-promosi.html" class="sidebar-link">
        <i class="bi bi-images"></i>
        <span>Kelola Promosi</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Page Header -->
    <header class="page-header">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h1 class="page-title">Tambah Hajatan</h1>
          <p class="page-subtitle">Buat data hajatan baru</p>
        </div>
        <button class="btn btn-link text-dark d-md-none mobile-header-toggle" id="menuToggle">
          <i class="bi bi-list fs-4"></i>
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-6">
          <div class="card">
            <div class="card-body p-4">
              <form id="hajatanForm" class="needs-validation" novalidate>
                <div class="mb-3">
                  <label class="form-label">Nama Hajatan <span class="text-danger">*</span></label>
                  <input type="text" class="form-control" id="namaHajatan" required placeholder="Contoh: Nikahan Asep & Siti">
                  <div class="invalid-feedback">Nama hajatan harus diisi</div>
                </div>

                <div class="mb-3">
                  <label class="form-label">Jenis Acara <span class="text-danger">*</span></label>
                  <select class="form-select" id="jenisAcara" required>
                    <option value="">Pilih Jenis</option>
                    <option value="Nikahan">Nikahan</option>
                    <option value="Sunatan">Sunatan</option>
                    <option value="Syukuran">Syukuran</option>
                    <option value="Kondangan">Kondangan</option>
                    <option value="Khitanan">Khitanan</option>
                    <option value="Aqiqah">Aqiqah</option>
                    <option value="Lainnya">Lainnya</option>
                  </select>
                  <div class="invalid-feedback">Pilih jenis acara</div>
                </div>

                <div class="mb-3">
                  <label class="form-label">Tanggal <span class="text-danger">*</span></label>
                  <input type="date" class="form-control" id="tanggal" required>
                  <div class="invalid-feedback">Tanggal harus diisi</div>
                </div>

                <div class="mb-3">
                  <label class="form-label">Lokasi</label>
                  <input type="text" class="form-control" id="lokasi" placeholder="Contoh: Kp. Sukamaju RT 02/03">
                </div>

                <div class="mb-4">
                  <label class="form-label">Catatan</label>
                  <textarea class="form-control" id="catatan" rows="3" placeholder="Catatan tambahan (opsional)"></textarea>
                </div>

                <div class="d-flex gap-2">
                  <a href="/hajatan/daftar-hajatan.html" class="btn btn-outline-secondary flex-grow-1">
                    <i class="bi bi-arrow-left me-1"></i> Batal
                  </a>
                  <button type="submit" class="btn btn-primary flex-grow-1" id="submitBtn">
                    <i class="bi bi-check-circle me-1"></i> Simpan
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Bottom Navigation (Mobile) -->
  <nav class="bottom-nav">
    <a href="/dashboard.html" class="bottom-nav-item">
      <i class="bi bi-house"></i>
      <span>Home</span>
    </a>
    <a href="/sumbangan/daftar-sumbangan.html" class="bottom-nav-item">
      <i class="bi bi-cash-stack"></i>
      <span>Sumbangan</span>
    </a>
    <a href="/hajatan/daftar-hajatan.html" class="bottom-nav-item active">
      <i class="bi bi-calendar-event"></i>
      <span>Hajatan</span>
    </a>
    <a href="/gorden/pelanggan.html" class="bottom-nav-item">
      <i class="bi bi-window-split"></i>
      <span>Gorden</span>
    </a>
    <a href="/gorden/kalkulator-rab.html" class="bottom-nav-item">
      <i class="bi bi-calculator"></i>
      <span>RAB</span>
    </a>
  </nav>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
    import { checkAuth } from '/assets/js/auth.js';
    import { createHajatan, showToast } from '/assets/js/app.js';

    // DOM Elements
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const menuToggle = document.getElementById('menuToggle');
    const form = document.getElementById('hajatanForm');
    const submitBtn = document.getElementById('submitBtn');

    // Initialize
    document.addEventListener('DOMContentLoaded', init);

    async function init() {
      // Check auth
      await checkAuth();

      // Mobile menu toggle
      menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('show');
        sidebarOverlay.classList.toggle('show');
      });

      sidebarOverlay.addEventListener('click', () => {
        sidebar.classList.remove('show');
        sidebarOverlay.classList.remove('show');
      });

      // Set default date to today
      document.getElementById('tanggal').value = new Date().toISOString().split('T')[0];

      // Form submit
      form.addEventListener('submit', handleSubmit);
    }

    async function handleSubmit(e) {
      e.preventDefault();

      if (!form.checkValidity()) {
        e.stopPropagation();
        form.classList.add('was-validated');
        return;
      }

      const data = {
        nama_hajatan: document.getElementById('namaHajatan').value.trim(),
        jenis_acara: document.getElementById('jenisAcara').value,
        tanggal: document.getElementById('tanggal').value,
        lokasi: document.getElementById('lokasi').value.trim() || null,
        catatan: document.getElementById('catatan').value.trim() || null
      };

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Menyimpan...';

      try {
        await createHajatan(data);
        showToast('Hajatan berhasil dibuat', 'success');
        setTimeout(() => {
          window.location.href = '/hajatan/daftar-hajatan.html';
        }, 1000);
      } catch (error) {
        showToast(error.message, 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="bi bi-check-circle me-1"></i> Simpan';
      }
    }
  </script>
</body>
</html>
