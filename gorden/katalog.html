<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Produk - Duta Interior Gorden</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">

  <!-- Sidebar Script -->
  <script type="module" src="/assets/js/sidebar.js"></script>

  <style>
    .katalog-img-box {
      height: 180px;
      background: linear-gradient(135deg, var(--primary-light) 0%, rgba(92, 96, 245, 0.05) 100%);
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      position: relative;
      overflow: hidden;
    }
    .katalog-img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .badge-kategori {
      position: absolute;
      top: 15px;
      right: 15px;
      font-weight: 700;
      font-size: 0.725rem;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      z-index: 10;
    }
    .image-preview-box {
      width: 100%;
      height: 160px;
      border: 2px dashed rgba(92, 96, 245, 0.3);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--secondary);
      overflow: hidden;
      position: relative;
    }
    .image-preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Page Header styles matching our premium floating card style */
    .page-header {
      background: white;
      border-radius: var(--radius-md, 12px);
      padding: 1.25rem 1.5rem;
      box-shadow: var(--shadow-sm, 0 4px 6px -1px rgba(0, 0, 0, 0.02));
      margin-bottom: 1.5rem;
      border: 1px solid var(--border-color, #f1f5f9);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
    }
    .page-header::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--primary-gradient, linear-gradient(135deg, #5c60f5 0%, #7d60f5 100%));
    }

    /* Keyframe Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .animate-slide-in-left {
      animation: slideInLeft 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Responsive: katalog grid di mobile */
    @media (max-width: 575.98px) {
      .page-header {
        padding: 0.85rem 1rem !important;
        margin-bottom: 1rem !important;
      }
      .page-title {
        font-size: 1.35rem !important;
      }
      .page-header .btn {
        padding: 0.35rem 0.6rem !important;
        font-size: 0.8rem !important;
      }
      .katalog-img-box {
        height: 110px;
      }
      .card-body {
        padding: 0.75rem !important;
      }
      .card-title {
        font-size: 0.85rem !important;
        margin-bottom: 0.25rem !important;
      }
      .card-text {
        font-size: 0.7rem !important;
        line-height: 1.35 !important;
        margin-bottom: 0.4rem !important;
      }
      .card-body .d-flex {
        flex-direction: column;
        align-items: flex-start !important;
        gap: 0.4rem;
        margin-top: 0.5rem !important;
        padding-top: 0.5rem !important;
      }
      .card-body .d-flex span {
        font-size: 0.9rem !important;
      }
      .card-body .d-flex span small {
        font-size: 0.7rem !important;
      }
      .badge-kategori {
        top: 8px;
        right: 8px;
        font-size: 0.6rem;
        padding: 0.25em 0.5em;
      }
      .btn-edit-prod {
        width: 100%;
        padding: 0.2rem 0.4rem !important;
        font-size: 0.7rem !important;
      }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Page Header -->
    <header class="page-header animate-slide-in-left">
      <div class="d-flex align-items-center justify-content-between w-100">
        <div>
          <h1 class="page-title m-0">
            <span class="d-md-none">Katalog</span>
            <span class="d-none d-md-inline">Katalog Produk</span>
          </h1>
          <p class="page-subtitle d-none d-md-block m-0">Daftar harga gorden, vitrace, blinds, dan aksesoris</p>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-primary btn-sm d-none align-items-center gap-1" id="addProdukBtn">
            <i class="bi bi-plus-circle"></i> <span class="d-none d-md-inline">Tambah Produk Baru</span>
          </button>
          <button class="btn btn-outline-danger btn-sm" id="btnLogout" title="Logout">
            <i class="bi bi-box-arrow-right"></i> <span class="d-none d-md-inline">Logout</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content animate-fade-in-up">
      <!-- Tabs Kategori -->
      <ul class="nav nav-pills mb-4 overflow-auto flex-nowrap pb-2 gap-2" id="katalogTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active text-nowrap btn" id="semua-tab" data-bs-toggle="pill" data-bs-target="#semua" type="button" role="tab">Semua</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link text-nowrap btn" id="blackout-tab" data-bs-toggle="pill" data-bs-target="#blackout" type="button" role="tab">Blackout 100%</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link text-nowrap btn" id="dimout-tab" data-bs-toggle="pill" data-bs-target="#dimout" type="button" role="tab">Dimout 80%</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link text-nowrap btn" id="vitrace-tab" data-bs-toggle="pill" data-bs-target="#vitrace" type="button" role="tab">Vitrace</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link text-nowrap btn" id="blinds-tab" data-bs-toggle="pill" data-bs-target="#blinds" type="button" role="tab">Blinds</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link text-nowrap btn" id="aksesoris-tab" data-bs-toggle="pill" data-bs-target="#aksesoris" type="button" role="tab">Aksesoris & Rell</button>
        </li>
      </ul>

      <!-- Tab Contents -->
      <div class="tab-content" id="katalogTabsContent">
        
        <!-- Tab 1: Semua -->
        <div class="tab-pane fade show active" id="semua" role="tabpanel">
          <div class="row g-2 g-md-4" id="semuaContainer">
            <div class="col-12 text-center py-5">
              <span class="spinner-border spinner-border-lg text-primary"></span>
            </div>
          </div>
        </div>

        <!-- Tab 2: Blackout -->
        <div class="tab-pane fade" id="blackout" role="tabpanel">
          <div class="row g-2 g-md-4" id="blackoutContainer"></div>
        </div>

        <!-- Tab 3: Dimout -->
        <div class="tab-pane fade" id="dimout" role="tabpanel">
          <div class="row g-2 g-md-4" id="dimoutContainer"></div>
        </div>

        <!-- Tab 4: Vitrace -->
        <div class="tab-pane fade" id="vitrace" role="tabpanel">
          <div class="row g-2 g-md-4" id="vitraceContainer"></div>
        </div>

        <!-- Tab 5: Blinds -->
        <div class="tab-pane fade" id="blinds" role="tabpanel">
          <div class="row g-2 g-md-4" id="blindsContainer"></div>
        </div>

        <!-- Tab 6: Aksesoris -->
        <div class="tab-pane fade" id="aksesoris" role="tabpanel">
          <div class="row g-2 g-md-4" id="aksesorisContainer"></div>
        </div>

      </div>
    </main>
  </div>

  <!-- Tambah Produk Modal -->
  <div class="modal fade" id="produkModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg">
        <div class="modal-header border-bottom">
          <h5 class="modal-title fw-bold">Tambah Produk Baru</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="produkForm" class="needs-validation" novalidate>
            <div class="mb-3">
              <label class="form-label">ID / Kode Produk <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="prodId" required placeholder="Contoh: amani-blackout">
              <div class="invalid-feedback">Kode produk wajib diisi (unik, huruf kecil, tanda hubung)</div>
            </div>

            <div class="mb-3">
              <label class="form-label">Nama Produk <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="prodNama" required placeholder="Contoh: Seri Amani Blackout">
              <div class="invalid-feedback">Nama produk wajib diisi</div>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label">Kategori <span class="text-danger">*</span></label>
                <select class="form-select" id="prodKategori" required>
                  <option value="Gorden Blackout">Gorden Blackout</option>
                  <option value="Gorden Dimout">Gorden Dimout</option>
                  <option value="Gorden Standar">Gorden Standar</option>
                  <option value="Vitrace">Vitrace</option>
                  <option value="Roller Blind">Roller Blind</option>
                  <option value="Vertical Blind">Vertical Blind</option>
                  <option value="Rell">Rell</option>
                  <option value="Kaca Film">Kaca Film</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Satuan <span class="text-danger">*</span></label>
                <select class="form-select" id="prodSatuan" required>
                  <option value="m">meter (m)</option>
                  <option value="m²">meter persegi (m²)</option>
                  <option value="Pcs">Pcs</option>
                </select>
              </div>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label">Harga Jual (Rp) <span class="text-danger">*</span></label>
                <input type="number" class="form-control" id="prodHarga" required placeholder="85000">
                <div class="invalid-feedback">Harga jual wajib diisi</div>
              </div>
              <div class="col-6">
                <label class="form-label">Icon Fallback <span class="text-danger">*</span></label>
                <select class="form-select" id="prodIcon" required>
                  <option value="bi-moon-stars">Bulan Bintang (Blackout)</option>
                  <option value="bi-sun-fill">Matahari (Dimout)</option>
                  <option value="bi-clouds">Awan (Vitrace)</option>
                  <option value="bi-distribute-vertical">Blind Vertikal</option>
                  <option value="bi-record-circle">Rell Tiang</option>
                  <option value="bi-gem">Permata (Premium)</option>
                  <option value="bi-box-seam">Boks (Standar)</option>
                </select>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Deskripsi Produk</label>
              <textarea class="form-control" id="prodDeskripsi" rows="3" placeholder="Keterangan tebal, peredaman cahaya, penolak panas, dll."></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Foto / Gambar Produk</label>
              <input type="file" class="form-control mb-2" id="prodGambar" accept="image/*">
              <div class="image-preview-box" id="previewContainer">
                <span class="text-muted small" id="previewText">Preview akan muncul jika gambar diunggah</span>
                <img id="imagePreview" class="d-none" alt="Preview Gambar">
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer d-flex justify-content-between">
          <button type="button" class="btn btn-outline-danger" id="deleteProdukModalBtn" style="display: none;">
            <i class="bi bi-trash me-1"></i> Hapus
          </button>
          <div class="d-flex gap-2 ms-auto">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
            <button type="button" class="btn btn-primary" id="saveProdukBtn">Unggah & Simpan</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation (Mobile) -->
  <nav class="bottom-nav">
    <a href="/dashboard.html" class="bottom-nav-item">
      <i class="bi bi-house"></i>
      <span>Home</span>
    </a>
    <a href="/sumbangan/daftar-sumbangan.html" class="bottom-nav-item">
      <i class="bi bi-people"></i>
      <span>Sumbangan</span>
    </a>
    <a href="/gorden/pelanggan.html" class="bottom-nav-item">
      <i class="bi bi-window-split"></i>
      <span>Gorden</span>
    </a>
    <a href="/gorden/katalog.html" class="bottom-nav-item active">
      <i class="bi bi-journal-richtext"></i>
      <span>Katalog</span>
    </a>
    <a href="/gorden/kelola-promosi.html" class="bottom-nav-item">
      <i class="bi bi-images"></i>
      <span>Promosi</span>
    </a>
  </nav>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script type="module">
    import { isLoggedIn, logout } from '/assets/js/auth.js';
    import { uploadFotoKain } from '/assets/js/cloudinary.js';
    import { getProdukKatalog, createProdukKatalog, updateProdukKatalog, deleteProdukKatalog, showToast } from '/assets/js/app.js';

    // State
    let catalogList = [];
    let editingProductId = null;
    const modalEl = document.getElementById('produkModal');
    const produkModal = new bootstrap.Modal(modalEl);
    const form = document.getElementById('produkForm');
    const fileInput = document.getElementById('prodGambar');
    const imagePreview = document.getElementById('imagePreview');
    const previewText = document.getElementById('previewText');
    const saveProdukBtn = document.getElementById('saveProdukBtn');

    // Initialize
    document.addEventListener('DOMContentLoaded', init);

    async function init() {
      // Verify logged in for additions
      const logged = await isLoggedIn();
      if (logged) {
        document.getElementById('addProdukBtn').classList.remove('d-none');
      }

      // Logout handler
      const btnLogout = document.getElementById('btnLogout');
      if (btnLogout) {
        btnLogout.addEventListener('click', async () => {
          try {
            await logout();
          } catch (err) {
            showToast('Gagal logout: ' + err.message, 'danger');
          }
        });
      }

      // Load Catalog Data
      await loadCatalog();

      // Form bindings
      document.getElementById('addProdukBtn').addEventListener('click', () => {
        openModal(null);
      });

      fileInput.addEventListener('change', handleImagePreview);
      saveProdukBtn.addEventListener('click', handleFormSubmit);

      // Delete button in modal handler
      const deleteModalBtn = document.getElementById('deleteProdukModalBtn');
      if (deleteModalBtn) {
        deleteModalBtn.addEventListener('click', async () => {
          if (!editingProductId) return;
          const name = document.getElementById('prodNama').value.trim();
          if (confirm(`Apakah Anda yakin ingin menghapus produk "${name}" dari katalog?`)) {
            try {
              deleteModalBtn.disabled = true;
              await deleteProdukKatalog(editingProductId);
              showToast(`Produk "${name}" berhasil dihapus`, 'success');
              produkModal.hide();
              await loadCatalog();
            } catch (err) {
              showToast(`Gagal menghapus produk: ${err.message}`, 'error');
            } finally {
              deleteModalBtn.disabled = false;
            }
          }
        });
      }

      // Auto-generate code id based on name
      document.getElementById('prodNama').addEventListener('input', (e) => {
        const idInput = document.getElementById('prodId');
        // only auto-fill if not manually touched or empty
        if (!idInput.value || idInput.value === slugify(e.target.value.substring(0, e.target.value.length - 1))) {
          idInput.value = slugify(e.target.value);
        }
      });
    }

    function openModal(item = null) {
      form.reset();
      form.classList.remove('was-validated');
      
      const modalTitleEl = document.querySelector('#produkModal .modal-title');
      const deleteModalBtn = document.getElementById('deleteProdukModalBtn');
      const idInput = document.getElementById('prodId');

      if (item) {
        editingProductId = item.id;
        modalTitleEl.textContent = 'Edit Produk';
        saveProdukBtn.textContent = 'Simpan Perubahan';
        deleteModalBtn.style.display = 'inline-block';
        
        // Fill form fields
        idInput.value = item.id;
        idInput.disabled = true;
        
        document.getElementById('prodNama').value = item.nama;
        document.getElementById('prodKategori').value = item.kategori;
        document.getElementById('prodSatuan').value = item.satuan;
        document.getElementById('prodHarga').value = item.harga;
        document.getElementById('prodIcon').value = item.icon || 'bi-box-seam';
        document.getElementById('prodDeskripsi').value = item.deskripsi || '';
        
        if (item.gambar_url) {
          imagePreview.src = item.gambar_url;
          imagePreview.classList.remove('d-none');
          previewText.classList.add('d-none');
        } else {
          imagePreview.src = '';
          imagePreview.classList.add('d-none');
          previewText.classList.remove('d-none');
        }
      } else {
        editingProductId = null;
        modalTitleEl.textContent = 'Tambah Produk Baru';
        saveProdukBtn.textContent = 'Unggah & Simpan';
        deleteModalBtn.style.display = 'none';
        
        idInput.value = '';
        idInput.disabled = false;
        
        imagePreview.src = '';
        imagePreview.classList.add('d-none');
        previewText.classList.remove('d-none');
      }
      produkModal.show();
    }

    function slugify(text) {
      return text.toString().toLowerCase()
        .replace(/\s+/g, '-')           // Replace spaces with -
        .replace(/[^\w\-]+/g, '')       // Remove all non-word chars
        .replace(/\-\-+/g, '-')         // Replace multiple - with single -
        .replace(/^-+/, '')             // Trim - from start
        .replace(/-+$/, '');            // Trim - from end
    }

    function handleImagePreview(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
          imagePreview.src = evt.target.result;
          imagePreview.classList.remove('d-none');
          previewText.classList.add('d-none');
        };
        reader.readAsDataURL(file);
      } else {
        imagePreview.src = '';
        imagePreview.classList.add('d-none');
        previewText.classList.remove('d-none');
      }
    }

    async function loadCatalog() {
      try {
        catalogList = await getProdukKatalog();
        renderCatalog();
      } catch (err) {
        console.error("Gagal mengambil katalog:", err);
      }
    }

    function createCard(item, loggedIn) {
      let badgeClass = 'bg-primary';
      if (item.kategori.includes('Dimout')) badgeClass = 'bg-warning text-dark';
      if (item.kategori.includes('Vitrace')) badgeClass = 'bg-info text-dark';
      if (item.kategori.includes('Blind')) badgeClass = 'bg-dark';
      if (item.kategori.includes('Rell') || item.kategori.includes('Aksesoris')) badgeClass = 'bg-secondary';
      if (item.kategori.includes('Kaca Film')) badgeClass = 'bg-danger';

      const imgHtml = item.gambar_url 
        ? `<img src="${item.gambar_url}" alt="${item.nama}">`
        : `<i class="bi ${item.icon} display-3"></i>`;

      const editBtn = loggedIn 
        ? `<button class="btn btn-sm btn-outline-primary px-3 rounded-pill btn-edit-prod" data-id="${item.id}"><i class="bi bi-pencil-fill"></i> Edit</button>`
        : '';

      return `
        <div class="col-6 col-md-6 col-lg-4">
          <div class="card h-100 position-relative animate-fade-in-up">
            <span class="badge ${badgeClass} badge-kategori">${item.kategori}</span>
            <div class="katalog-img-box">
              ${imgHtml}
            </div>
            <div class="card-body d-flex flex-column justify-content-between p-4" style="min-height: 160px;">
              <div>
                <h5 class="card-title mb-2 text-dark" style="font-size: 1.1rem; font-weight: 700;">${item.nama}</h5>
                <p class="card-text text-muted small mb-3" style="line-height: 1.6;">${item.deskripsi || 'Tidak ada deskripsi'}</p>
              </div>
              <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top border-light">
                <span class="text-primary fw-bold fs-5">Rp ${item.harga.toLocaleString('id-ID')} <small class="text-muted fs-6">/ ${item.satuan}</small></span>
                ${editBtn}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    async function renderCatalog() {
      const logged = await isLoggedIn();

      // Render tab "Semua"
      document.getElementById('semuaContainer').innerHTML = catalogList.map(item => createCard(item, logged)).join('');

      // Map categories to Tab Containers
      const tabContainers = {
        'blackout': (item) => item.kategori === 'Gorden Blackout',
        'dimout': (item) => item.kategori === 'Gorden Dimout',
        'vitrace': (item) => item.kategori === 'Vitrace',
        'blinds': (item) => item.kategori.includes('Blind'),
        'aksesoris': (item) => item.kategori === 'Rell' || item.kategori === 'Aksesoris' || item.kategori === 'Gorden Standar' || item.kategori === 'Kaca Film'
      };

      Object.keys(tabContainers).forEach(tab => {
        const filtered = catalogList.filter(tabContainers[tab]);
        const html = filtered.map(item => createCard(item, logged)).join('');
        document.getElementById(`${tab}Container`).innerHTML = html || `<div class="col-12 text-center py-5 text-muted"><i class="bi bi-inbox fs-1 d-block mb-2"></i>Belum ada produk di kategori ini</div>`;
      });

      // Bind edit handlers
      document.querySelectorAll('.btn-edit-prod').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          const item = catalogList.find(p => p.id === id);
          if (item) {
            openModal(item);
          }
        });
      });
    }

    async function handleFormSubmit(e) {
      e.preventDefault();

      if (!form.checkValidity()) {
        e.stopPropagation();
        form.classList.add('was-validated');
        return;
      }

      saveProdukBtn.disabled = true;
      saveProdukBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Menyimpan...';

      try {
        let imageUrl = null;
        if (editingProductId) {
          const existingProd = catalogList.find(p => p.id === editingProductId);
          if (existingProd) imageUrl = existingProd.gambar_url;
        }

        const file = fileInput.files[0];
        
        // Upload to Cloudinary if image is selected
        if (file) {
          imageUrl = await uploadFotoKain(file);
          if (!imageUrl) {
            throw new Error('Gagal mengupload gambar ke Cloudinary. Silakan coba lagi.');
          }
        }

        const category = document.getElementById('prodKategori').value;
        
        // map category text to a category_id slug for landing page logic
        let categoryId = 'other';
        if (category === 'Gorden Blackout') categoryId = 'gorden-blackout';
        else if (category === 'Gorden Dimout') categoryId = 'gorden-dimout';
        else if (category === 'Gorden Standar') categoryId = 'gorden-standar';
        else if (category === 'Vitrace') categoryId = 'vitrace';
        else if (category === 'Roller Blind') categoryId = 'roller-blind';
        else if (category === 'Vertical Blind') categoryId = 'vertical-blind';
        else if (category === 'Kaca Film') categoryId = 'kaca-film';
        else if (category === 'Rell') categoryId = 'rell';

        const payload = {
          nama: document.getElementById('prodNama').value.trim(),
          kategori: category,
          kategori_id: categoryId,
          deskripsi: document.getElementById('prodDeskripsi').value.trim() || null,
          harga: parseInt(document.getElementById('prodHarga').value) || 0,
          satuan: document.getElementById('prodSatuan').value,
          icon: document.getElementById('prodIcon').value,
          gambar_url: imageUrl
        };

        if (editingProductId) {
          await updateProdukKatalog(editingProductId, payload);
          showToast(`Produk "${payload.nama}" berhasil diperbarui!`, 'success');
        } else {
          payload.id = document.getElementById('prodId').value.trim();
          await createProdukKatalog(payload);
          showToast(`Produk "${payload.nama}" berhasil ditambahkan ke katalog!`, 'success');
        }
        
        produkModal.hide();
        await loadCatalog();

      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        saveProdukBtn.disabled = false;
        saveProdukBtn.textContent = editingProductId ? 'Simpan Perubahan' : 'Unggah & Simpan';
      }
    }
  </script>
</body>
</html>
