<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Manajemen Keluarga</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="/assets/css/style.css" rel="stylesheet">

  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .login-card {
      background: var(--bg-card);
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .login-header-icon {
      width: 64px;
      height: 64px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1rem;
    }

    .login-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
    }

    .login-header p {
      font-size: 0.9rem;
      opacity: 0.9;
      margin: 0;
    }

    .login-body {
      padding: 2rem;
    }

    .login-tabs {
      display: flex;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--border-color);
    }

    .login-tab {
      flex: 1;
      padding: 0.75rem;
      text-align: center;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .login-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .login-form .form-control {
      padding: 0.875rem 1rem;
      font-size: 1rem;
    }

    .login-form .btn-primary {
      padding: 0.875rem;
      font-size: 1rem;
    }

    .login-divider {
      display: flex;
      align-items: center;
      margin: 1.5rem 0;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    .login-divider span {
      padding: 0 1rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .login-back {
      text-align: center;
      margin-top: 1.5rem;
    }

    .login-back a {
      color: var(--text-muted);
      font-size: 0.9rem;
      text-decoration: none;
    }

    .login-back a:hover {
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-header-icon">
          <i class="bi bi-house-heart"></i>
        </div>
        <h1>Manajemen Keluarga</h1>
        <p>Sistem pencatatan data sumbangan & gorden</p>
      </div>

      <div class="login-body">
        <div class="login-tabs">
          <button class="login-tab active" data-tab="login">Masuk</button>
          <button class="login-tab" data-tab="register">Daftar</button>
        </div>

        <!-- Login Form -->
        <form class="login-form" id="loginForm">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="loginEmail" placeholder="nama@email.com" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="loginPassword" placeholder="Masukkan password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i> Masuk
          </button>
        </form>

        <!-- Register Form -->
        <form class="login-form d-none" id="registerForm">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="registerEmail" placeholder="nama@email.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="registerPassword" placeholder="Minimal 6 karakter" required minlength="6">
          </div>
          <div class="mb-4">
            <label class="form-label">Konfirmasi Password</label>
            <input type="password" class="form-control" id="registerConfirm" placeholder="Ulangi password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-person-plus me-1"></i> Daftar
          </button>
        </form>

        <div class="login-back">
          <a href="/"><i class="bi bi-arrow-left me-1"></i> Kembali ke Dashboard</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
    import { login, register } from '/assets/js/auth.js';
    import { showToast } from '/assets/js/app.js';
    import { supabase } from '/assets/js/supabase.js';

    // DOM Elements
    const loginTabs = document.querySelectorAll('.login-tab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');

    // Tab switching
    loginTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        loginTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        if (tab.dataset.tab === 'login') {
          loginForm.classList.remove('d-none');
          registerForm.classList.add('d-none');
        } else {
          loginForm.classList.add('d-none');
          registerForm.classList.remove('d-none');
        }
      });
    });

    // Login Form
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const submitBtn = loginForm.querySelector('button[type="submit"]');

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Memproses...';

      try {
        await login(email, password);
        showToast('Login berhasil!', 'success');
        setTimeout(() => {
          window.location.href = '/';
        }, 500);
      } catch (error) {
        showToast(error.message, 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i> Masuk';
      }
    });

    // Register Form
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const confirm = document.getElementById('registerConfirm').value;
      const submitBtn = registerForm.querySelector('button[type="submit"]');

      if (password !== confirm) {
        showToast('Password tidak cocok', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Memproses...';

      try {
        await register(email, password);
        showToast('Registrasi berhasil! Silakan cek email Anda.', 'success');

        // Switch to login tab
        loginTabs.forEach(t => t.classList.remove('active'));
        loginTabs[0].classList.add('active');
        loginForm.classList.remove('d-none');
        registerForm.classList.add('d-none');

      } catch (error) {
        showToast(error.message, 'error');
      }

      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="bi bi-person-plus me-1"></i> Daftar';
    });

    // Check if already logged in
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        window.location.href = '/';
      }
    });
  </script>
</body>
</html>
